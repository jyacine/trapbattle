<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 64">
  <defs>
    <linearGradient id="sg_barrel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0b0b8"/>
      <stop offset="50%" stop-color="#d8d8e0"/>
      <stop offset="100%" stop-color="#808088"/>
    </linearGradient>
    <linearGradient id="sg_wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c47a30"/>
      <stop offset="60%" stop-color="#e8a050"/>
      <stop offset="100%" stop-color="#8b4e18"/>
    </linearGradient>
    <linearGradient id="sg_metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#909098"/>
      <stop offset="50%" stop-color="#c0c0cc"/>
      <stop offset="100%" stop-color="#606068"/>
    </linearGradient>
  </defs>
  <!-- Stock wood -->
  <polygon points="86,27 120,25 124,38 88,42" fill="url(#sg_wood)"/>
  <rect x="120" y="25" width="6" height="14" rx="2" fill="#4a2a0a"/>
  <!-- Receiver -->
  <rect x="60" y="21" width="30" height="21" rx="3" fill="url(#sg_metal)"/>
  <rect x="66" y="24" width="14" height="9" rx="1" fill="#3a3a42"/>
  <!-- Top barrel -->
  <rect x="5" y="23" width="57" height="7" rx="2" fill="url(#sg_barrel)"/>
  <!-- Bottom barrel -->
  <rect x="5" y="31" width="57" height="7" rx="2" fill="url(#sg_barrel)"/>
  <!-- Barrel rib -->
  <rect x="9" y="29" width="49" height="3" fill="#a0a0a8"/>
  <!-- Muzzle -->
  <rect x="3" y="22" width="5" height="17" rx="1" fill="#606068"/>
  <!-- Pump forend -->
  <rect x="18" y="37" width="34" height="9" rx="3" fill="url(#sg_wood)"/>
  <line x1="25" y1="37" x2="25" y2="46" stroke="#7a4010" stroke-width="1.2"/>
  <line x1="32" y1="37" x2="32" y2="46" stroke="#7a4010" stroke-width="1.2"/>
  <line x1="39" y1="37" x2="39" y2="46" stroke="#7a4010" stroke-width="1.2"/>
  <line x1="46" y1="37" x2="46" y2="46" stroke="#7a4010" stroke-width="1.2"/>
  <!-- Trigger guard -->
  <path d="M70,42 Q74,52 80,42" stroke="#606068" stroke-width="2.5" fill="none"/>
  <line x1="74" y1="42" x2="75" y2="48" stroke="#404040" stroke-width="2"/>
  <!-- Grip -->
  <polygon points="80,42 90,42 88,58 78,58" fill="url(#sg_wood)"/>
  <line x1="81" y1="45" x2="87" y2="45" stroke="#7a4010" stroke-width="0.8"/>
  <line x1="81" y1="49" x2="87" y2="49" stroke="#7a4010" stroke-width="0.8"/>
  <line x1="81" y1="53" x2="87" y2="53" stroke="#7a4010" stroke-width="0.8"/>
  <!-- Sights -->
  <rect x="7" y="20" width="3" height="4" rx="0.5" fill="#505058"/>
  <rect x="56" y="19" width="6" height="4" rx="0.5" fill="#505058"/>
  <!-- Sling swivel -->
  <circle cx="22" cy="43" r="2" fill="#808088"/>
</svg>
