<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 64">
  <defs>
    <linearGradient id="mg_dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a7a84"/>
      <stop offset="50%" stop-color="#a8a8b4"/>
      <stop offset="100%" stop-color="#4a4a52"/>
    </linearGradient>
    <linearGradient id="mg_barrel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#909098"/>
      <stop offset="50%" stop-color="#c8c8d0"/>
      <stop offset="100%" stop-color="#606068"/>
    </linearGradient>
    <linearGradient id="mg_mag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#686870"/>
      <stop offset="100%" stop-color="#3a3a42"/>
    </linearGradient>
  </defs>
  <!-- Carry handle / sight rail on top of receiver -->
  <rect x="42" y="12" width="30" height="9" rx="2" fill="url(#mg_dark)"/>
  <rect x="46" y="14" width="7" height="5" rx="1" fill="#2a2a30"/>
  <rect x="60" y="14" width="7" height="5" rx="1" fill="#2a2a30"/>

  <!-- Main receiver (boxy) -->
  <rect x="38" y="20" width="38" height="20" rx="3" fill="url(#mg_dark)"/>
  <!-- Charging handle slot -->
  <rect x="68" y="22" width="5" height="8" rx="1" fill="#2a2a30"/>
  <rect x="70" y="23" width="4" height="6" rx="0.5" fill="#555560"/>

  <!-- Long barrel -->
  <rect x="5" y="25" width="35" height="8" rx="2" fill="url(#mg_barrel)"/>
  <!-- Barrel vent holes -->
  <circle cx="12" cy="29" r="2" fill="#3a3a42"/>
  <circle cx="19" cy="29" r="2" fill="#3a3a42"/>
  <circle cx="26" cy="29" r="2" fill="#3a3a42"/>
  <!-- Muzzle brake -->
  <rect x="2" y="23" width="6" height="12" rx="1" fill="#606068"/>
  <line x1="2" y1="27" x2="8" y2="27" stroke="#4a4a52" stroke-width="1.5"/>
  <line x1="2" y1="32" x2="8" y2="32" stroke="#4a4a52" stroke-width="1.5"/>

  <!-- Rear stock / buffer tube -->
  <rect x="74" y="25" width="28" height="12" rx="4" fill="url(#mg_dark)"/>
  <rect x="99" y="24" width="5" height="14" rx="2" fill="#3a3a42"/>

  <!-- Box magazine hanging below -->
  <rect x="50" y="40" width="16" height="20" rx="3" fill="url(#mg_mag)"/>
  <!-- Magazine texture -->
  <line x1="53" y1="44" x2="63" y2="44" stroke="#555560" stroke-width="1"/>
  <line x1="53" y1="48" x2="63" y2="48" stroke="#555560" stroke-width="1"/>
  <line x1="53" y1="52" x2="63" y2="52" stroke="#555560" stroke-width="1"/>
  <!-- Magazine release notch -->
  <rect x="48" y="41" width="3" height="5" rx="1" fill="#4a4a52"/>

  <!-- Pistol grip -->
  <polygon points="72,40 82,40 80,58 70,58" fill="url(#mg_dark)"/>
  <!-- Grip texture -->
  <line x1="72" y1="43" x2="80" y2="43" stroke="#3a3a42" stroke-width="0.8"/>
  <line x1="72" y1="47" x2="80" y2="47" stroke="#3a3a42" stroke-width="0.8"/>
  <line x1="72" y1="51" x2="80" y2="51" stroke="#3a3a42" stroke-width="0.8"/>
  <line x1="72" y1="55" x2="80" y2="55" stroke="#3a3a42" stroke-width="0.8"/>

  <!-- Trigger guard -->
  <path d="M62,40 Q66,52 72,40" stroke="#505058" stroke-width="2.5" fill="none"/>
  <line x1="66" y1="40" x2="67" y2="46" stroke="#404040" stroke-width="2"/>

  <!-- Front sight post -->
  <rect x="33" y="22" width="3" height="5" rx="0.5" fill="#505058"/>
</svg>
