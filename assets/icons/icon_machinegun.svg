<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Receiver (boxy) -->
  <rect x="14" y="22" width="24" height="16" rx="2" fill="white"/>
  <!-- Long barrel -->
  <rect x="36" y="27" width="26" height="6" rx="1" fill="white"/>
  <!-- Muzzle brake notch -->
  <rect x="58" y="25" width="4" height="10" rx="1" fill="white"/>
