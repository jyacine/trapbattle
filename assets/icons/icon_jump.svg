<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- head -->
  <circle cx="50" cy="13" r="10" fill="white" opacity="0.90"/>
  <!-- body -->
  <line x1="50" y1="23" x2="50" y2="52" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.90"/>
  <!-- arms raised (victory/jump pose) -->
  <line x1="50" y1="33" x2="18" y2="18" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.90"/>
  <line x1="50" y1="33" x2="82" y2="18" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.90"/>
  <!-- legs bent outward (airborne) -->
  <line x1="50" y1="52" x2="26" y2="74" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.90"/>
  <line x1="26" y1="74" x2="14" y2="62" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.90"/>
  <line x1="50" y1="52" x2="74" y2="74" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.90"/>
  <line x1="74" y1="74" x2="86" y2="62" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.90"/>
  <!-- upward arrow under feet -->
  <polygon points="50,88 43,96 57,96" fill="white" opacity="0.60"/>
</svg>
