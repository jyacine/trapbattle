  <rect x="10" y="10" width="8" height="108" fill="#4a3a8c"/>
  <rect x="10" y="110" width="108" height="8" fill="#4a3a8c"/>
  <rect x="110" y="10" width="8" height="108" fill="#4a3a8c"/>
  <rect x="30" y="10" width="8" height="60" fill="#4a3a8c"/>
  <rect x="50" y="40" width="8" height="78" fill="#4a3a8c"/>
  <rect x="70" y="10" width="8" height="60" fill="#4a3a8c"/>
  <rect x="90" y="50" width="8" height="68" fill="#4a3a8c"/>
